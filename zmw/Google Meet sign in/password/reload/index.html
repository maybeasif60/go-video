<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>
  <link rel="icon" href="../../assets/logoo.png" type="image/x-icon">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000;
      color: #fff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Roboto', sans-serif;
    }

    .loading-container {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 20px;
      font-weight: 300;
    }
  </style>
</head>
<body>
  <div class="loading-container">
    <div class="spinner"></div>
    <span class="loading-text">Loading...</span>
  </div>

  <script>

    
    // 3 seconds পর ভিডিও কল পেজে রিডাইরেক্ট
    setTimeout(() => {
      window.location.href = "./videocall/";
    }, 3000);
  </script>
</body>
</html>
